name: Deploy Security Stack to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Setup Script on GCP via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: creolemacmini02 
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            # 1. Prepare Server (Install Git if missing)
            sudo apt-get update && sudo apt-get install -y git
            
            # 2. Force-Sync code folder from GitHub
            if [ ! -d "security-pipeline" ]; then
              git clone https://github.com/${{ github.repository }}.git
            fi
            
            cd security-pipeline
            
            # This part fixes the 'merge conflict' error by overwriting local changes
            git fetch origin main
            git reset --hard origin/main

            # 3. Setup the Self-Healing Trigger (Registers Systemd)
            chmod +x setup.sh
            sudo ./setup.sh

            # 4. RUN THE INSTALLER INTERACTIVELY (So we see highlights in GitHub)
            chmod +x scripts/health-check.sh
            sudo ./scripts/health-check.sh
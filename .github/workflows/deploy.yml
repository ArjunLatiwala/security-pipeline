name: Deploy Security Stack to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Setup Script on GCP via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          # REPLACE 'your-username' with the name found at the end of your .pub key
          username: creolemacmini02 
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
script: |
            # 1. Install Git (Required because the server is minimized)
            sudo apt-get update
            sudo apt-get install -y git

            # 2. Clone or Update the repository
            if [ ! -d "security-pipeline" ]; then
              git clone https://github.com/${{ github.repository }}.git
            fi
            
            cd security-pipeline
            git pull origin main

            # 3. Run the setup
            chmod +x setup.sh
            sudo ./setup.sh
